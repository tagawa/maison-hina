<div class="timeline">

  {% for event in page.events %}
    <div class="timeline-item">

      <div class="timeline-date">
        {{ event.date }}
      </div>

      <div class="timeline-content">
        <h3>{{ event.title }}</h3>

        {% if event.description %}
          <p>{{ event.description }}</p>
        {% endif %}

      </div>

    </div>
  {% endfor %}

</div>
