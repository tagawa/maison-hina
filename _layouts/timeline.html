{{ define "main" }}

<main class="timeline-page">

  <h1>{{ .Title }}</h1>

  {{ if .Params.intro }}
    <p class="timeline-intro">{{ .Params.intro }}</p>
  {{ end }}

  <div class="timeline">

    {{ range .Params.events }}
      <div class="timeline-item">

        <div class="timeline-date">
          {{ .date }}
        </div>

        <div class="timeline-content">
          <h3>{{ .title }}</h3>

          {{ if .description }}
            <p>{{ .description }}</p>
          {{ end }}

        </div>

      </div>
    {{ end }}

  </div>

</main>

{{ end }}
